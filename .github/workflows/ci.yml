name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      ADMIN_JWT_SECRET: test-admin-jwt-secret-32-characters
      CLIENT_JWT_SECRET: test-client-jwt-secret-32-characters
      ACCESS_KEY_ID: test-access-key-id
      SECRET_ACCESS_KEY: test-secret-access-key
      ENDPOINT: https://example.com

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Harness check
        run: pnpm harness:check

      - name: Contracts typecheck
        run: pnpm typecheck:contracts

      - name: Backend typecheck
        run: pnpm --filter ./backend typecheck

      - name: Prepare backend database
        run: pnpm --filter ./backend push

      - name: Backend tests
        run: pnpm --filter ./backend test --run

      - name: Frontend build
        run: pnpm --filter frontend build

      - name: Frontend tests
        run: pnpm --filter frontend test --run

      - name: Lint
        run: pnpm lint
